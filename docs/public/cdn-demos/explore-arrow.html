<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchina + ArrowJS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #e2e8f0; text-align: center; margin-bottom: 8px; font-size: 2rem; }
        .source-note { color: #94a3b8; text-align: center; margin-bottom: 32px; font-family: monospace; font-size: 0.85rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        h2 { color: #1e293b; margin-bottom: 16px; font-size: 1.25rem; }
        .traffic-housing { display: flex; flex-direction: column; gap: 8px; padding: 20px; background: #1e293b; border-radius: 12px; border: 2px solid #334155; width: fit-content; margin: 20px auto; }
        .light { width: 60px; height: 60px; border-radius: 50%; transition: all 0.3s; }
        .light.off { background: #334155; }
        .light.red { background: #ef4444; box-shadow: 0 0 20px #ef4444; }
        .light.yellow { background: #eab308; box-shadow: 0 0 20px #eab308; }
        .light.green { background: #22c55e; box-shadow: 0 0 20px #22c55e; }
        .state-label { font-family: monospace; background: #f1f5f9; padding: 12px; border-radius: 6px; color: #1e293b; font-weight: 600; text-align: center; margin: 16px 0; font-size: 0.9rem; }
        .counter-display { font-size: 4rem; text-align: center; font-weight: bold; color: #6366f1; margin: 20px 0; font-variant-numeric: tabular-nums; }
        .buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 16px 0; }
        button { padding: 8px 16px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-secondary { background: #ec4899; color: white; }
        .btn-secondary:hover { background: #db2777; }
        .btn-small { font-size: 0.75rem; padding: 6px 12px; }
        .log { background: #1e293b; color: #10b981; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 0.8rem; height: 60px; overflow-y: auto; line-height: 1.4; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Matchina + ArrowJS</h1>
        <div class="source-note">matchina state machine drives Arrow reactive rendering &middot; both via esm.sh</div>

        <div class="grid">
            <div id="tl-card"  class="card"></div>
            <div id="cnt-card" class="card"></div>
        </div>
    </div>

    <script type="module">
        const { matchina, defineStates, createStore } =
            await import('https://esm.sh/matchina@0.3.0-alpha.0?bundle&exports=matchina,createStore,defineStates');
        const { reactive, html } = await import('https://esm.sh/@arrow-js/core@1.0.6');

        // --- Traffic light: matchina drives reactive state -----------------
        const states = defineStates({ Red: undefined, Yellow: undefined, Green: undefined });
        const traffic = matchina(
            states,
            {
                Red:    { next: 'Green',  reset: 'Red' },
                Green:  { next: 'Yellow', reset: 'Red' },
                Yellow: { next: 'Red',    reset: 'Red' },
            },
            'Red'
        );

        const tl = reactive({ state: traffic.getState().key, log: 'Waiting for events...' });
        traffic.subscribe(ev => {
            tl.state = ev.to.key;
            tl.log = `[${new Date().toLocaleTimeString()}] ${ev.from.key} → ${ev.to.key}`;
        });

        html`
            <h2>Traffic Light (matchina)</h2>
            <div class="traffic-housing">
                <div class="${() => `light ${tl.state === 'Red'    ? 'red'    : 'off'}`}"></div>
                <div class="${() => `light ${tl.state === 'Yellow' ? 'yellow' : 'off'}`}"></div>
                <div class="${() => `light ${tl.state === 'Green'  ? 'green'  : 'off'}`}"></div>
            </div>
            <div class="state-label">${() => tl.state}</div>
            <div class="buttons">
                <button class="btn-primary" @click="${() => traffic.next()}">Next Signal</button>
                <button class="btn-secondary btn-small" @click="${() => traffic.reset()}">Reset</button>
            </div>
            <div class="log">${() => tl.log}</div>
        `(document.getElementById('tl-card'));

        // --- Counter: store drives reactive state ------------------
        const counter = createStore(0, {
            increment: (amt = 1) => (ch) => ch.from + amt,
            decrement: (amt = 1) => (ch) => ch.from - amt,
            set: (value) => value,
            reset: () => 0,
        });

        const cnt = reactive({ value: counter.getState(), log: 'Waiting for events...' });
        counter.subscribe(ev => {
            cnt.value = counter.getState();
            cnt.log = `[${new Date().toLocaleTimeString()}] ${ev.from} → ${ev.to}`;
        });

        html`
            <h2>Counter Store</h2>
            <div class="counter-display">${() => cnt.value}</div>
            <div class="buttons">
                <button class="btn-primary" @click="${() => counter.decrement(5)}">-5</button>
                <button class="btn-primary" @click="${() => counter.decrement()}">-1</button>
                <button class="btn-primary" @click="${() => counter.increment()}">+1</button>
                <button class="btn-primary" @click="${() => counter.increment(5)}">+5</button>
            </div>
            <div class="buttons">
                <button class="btn-secondary btn-small" @click="${() => counter.set(100)}">Set 100</button>
                <button class="btn-secondary btn-small" @click="${() => counter.reset()}">Reset</button>
            </div>
            <div class="log">${() => cnt.log}</div>
        `(document.getElementById('cnt-card'));

        window.traffic = traffic;
        window.counter = counter;
    </script>
</body>
</html>
