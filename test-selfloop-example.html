<!DOCTYPE html>
<html>
<head>
    <title>Self-Loop Example Test</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #root { width: 100vw; height: 100vh; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@xyflow/react@12.10.0/dist/umd/index.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useMemo } = React;
        const { ReactFlow, addEdge, Background, Controls, useNodesState, useEdgesState } = ReactFlow;

        // Self-connecting edge component from ReactFlow docs
        function SelfConnectingEdge({ id, sourceX, sourceY, targetX, targetY, markerEnd }) {
            const radiusX = (sourceX - targetX) * 0.6;
            const radiusY = 50;
            const edgePath = `M ${sourceX - 5} ${sourceY} A ${radiusX} ${radiusY} 0 1 0 ${targetX + 2} ${targetY}`;

            return (
                <>
                    <path
                        id={id}
                        style={{ stroke: 'black', strokeWidth: 2 }}
                        d={edgePath}
                        markerEnd={markerEnd}
                    />
                </>
            );
        }

        // Edge types
        const edgeTypes = {
            selfconnecting: SelfConnectingEdge,
        };

        // Initial nodes and edges
        const initialNodes = [
            { id: '1', type: 'default', data: { label: 'Node 1' }, position: { x: 100, y: 100 } },
        ];

        const initialEdges = [
            { id: 'e1', source: '1', target: '1', type: 'selfconnecting' },
        ];

        function App() {
            const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges);

            const onConnect = useCallback((params) => setEdges((eds) => addEdge(params, eds)), [setEdges]);

            return (
                <div style={{ width: '100vw', height: '100vh' }}>
                    <ReactFlow
                        nodes={nodes}
                        edges={edges}
                        onNodesChange={onNodesChange}
                        onEdgesChange={onEdgesChange}
                        onConnect={onConnect}
                        edgeTypes={edgeTypes}
                        fitView
                    >
                        <Controls />
                        <Background />
                    </ReactFlow>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
