<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Enhanced FitView Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.11.4/dist/umd/index.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-container { border: 1px solid #ccc; margin: 10px 0; padding: 10px; }
        .react-flow { width: 100%; height: 400px; border: 1px solid #ddd; }
        .controls { margin: 10px 0; }
        button { margin: 5px; padding: 8px 16px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .pass { color: green; }
        .fail { color: red; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback, useRef } = React;
        const { ReactFlow, Controls, useReactFlow } = ReactFlow;

        // Simple DOM-based label bounds calculation
        function calculateLabelBounds(edges) {
            const labelBounds = [];
            
            edges.forEach(edge => {
                if (!edge.label) return;
                
                // Find the label element in the DOM
                const labelElements = document.querySelectorAll('.react-flow__edge-text');
                labelElements.forEach(element => {
                    if (element.textContent === edge.label) {
                        const rect = element.getBoundingClientRect();
                        labelBounds.push(rect);
                    }
                });
            });
            
            return labelBounds;
        }

        // Simple enhanced fitView using actual DOM measurements
        async function simpleEnhancedFitView(reactFlowInstance, options = {}) {
            const {
                includeLabels = true,
                padding = 0.05,
                duration = 800
            } = options;
            
            const nodes = reactFlowInstance.getNodes();
            const edges = reactFlowInstance.getEdges();
            
            console.log('🔍 [simpleEnhancedFitView] Nodes:', nodes.length, 'Edges:', edges.length);
            console.log('🔍 [simpleEnhancedFitView] Edges with labels:', edges.filter(e => e.label).length);
            
            // Start with node bounds
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            
            // Include node boundaries
            nodes.forEach(node => {
                const x = node.position.x;
                const y = node.position.y;
                const width = node.width || 120;
                const height = node.height || 80;
                
                minX = Math.min(minX, x);
                minY = Math.min(minY, y);
                maxX = Math.max(maxX, x + width);
                maxY = Math.max(maxY, y + height);
            });
            
            // Include edge label bounds if requested
            if (includeLabels) {
                const labelBounds = calculateLabelBounds(edges);
                console.log('🔍 [simpleEnhancedFitView] Found label bounds:', labelBounds.length);
                
                labelBounds.forEach(rect => {
                    // Convert screen coordinates to flow coordinates
                    const flowBounds = reactFlowInstance.getViewport();
                    const flowX = rect.left + flowBounds.x;
                    const flowY = rect.top + flowBounds.y;
                    
                    minX = Math.min(minX, flowX);
                    minY = Math.min(minY, flowY);
                    maxX = Math.max(maxX, flowX + rect.width);
                    maxY = Math.max(maxY, flowY + rect.height);
                });
            }
            
            // Apply padding
            const width = maxX - minX;
            const height = maxY - minY;
            const paddingX = width * padding;
            const paddingY = height * padding;
            
            const bounds = {
                x: minX - paddingX,
                y: minY - paddingY,
                width: width + (paddingX * 2),
                height: height + (paddingY * 2)
            };
            
            console.log('🔍 [simpleEnhancedFitView] Final bounds:', bounds);
            
            // Use ReactFlow's fitBounds
            await reactFlowInstance.fitBounds(bounds, { duration });
            
            console.log('🔍 [simpleEnhancedFitView] Completed');
        }

        function TestApp() {
            const [testResult, setTestResult] = useState(null);
            const [testRunning, setTestRunning] = useState(false);
            const reactFlowInstance = useReactFlow();
            
            // Test nodes with edge labels
            const [nodes, setNodes] = useState([
                { id: '1', position: { x: 0, y: 0 }, data: { label: 'Node 1' }, width: 120, height: 80 },
                { id: '2', position: { x: 300, y: 100 }, data: { label: 'Node 2' }, width: 120, height: 80 },
                { id: '3', position: { x: 150, y: 300 }, data: { label: 'Node 3' }, width: 120, height: 80 }
            ]);
            
            const [edges, setEdges] = useState([
                { id: 'e1-2', source: '1', target: '2', label: 'Long Edge Label Here' },
                { id: 'e2-3', source: '2', target: '3', label: 'Another Label' },
                { id: 'e1-3', source: '1', target: '3', label: 'Third Label' }
            ]);

            const runTest = async (includeLabels) => {
                setTestRunning(true);
                setTestResult(null);
                
                try {
                    const startTime = Date.now();
                    
                    await simpleEnhancedFitView(reactFlowInstance, {
                        includeLabels,
                        padding: 0.05,
                        duration: 800
                    });
                    
                    const endTime = Date.now();
                    
                    setTestResult({
                        includeLabels,
                        success: true,
                        duration: endTime - startTime,
                        message: `${includeLabels ? 'With' : 'Without'} labels test completed successfully`
                    });
                } catch (error) {
                    setTestResult({
                        includeLabels,
                        success: false,
                        error: error.message,
                        message: `${includeLabels ? 'With' : 'Without'} labels test failed: ${error.message}`
                    });
                } finally {
                    setTestRunning(false);
                }
            };

            return (
                <div>
                    <h1>Simple Enhanced FitView Test</h1>
                    
                    <div className="test-container">
                        <h2>Test Diagram</h2>
                        <p>This diagram has nodes with long edge labels to test the enhanced fitView functionality.</p>
                        
                        <div className="react-flow">
                            <ReactFlow
                                nodes={nodes}
                                edges={edges}
                                fitView
                                fitViewOptions={{ padding: 0.1 }}
                            >
                                <Controls />
                            </ReactFlow>
                        </div>
                    </div>

                    <div className="test-container">
                        <h2>Test Controls</h2>
                        <div className="controls">
                            <button onClick={() => runTest(false)} disabled={testRunning}>
                                Test: Nodes Only
                            </button>
                            <button onClick={() => runTest(true)} disabled={testRunning}>
                                Test: Include Labels
                            </button>
                        </div>
                        
                        {testRunning && <div className="result">Running test...</div>}
                        
                        {testResult && (
                            <div className={`result ${testResult.success ? 'pass' : 'fail'}`}>
                                <strong>{testResult.message}</strong>
                                {testResult.duration && <p>Duration: {testResult.duration}ms</p>}
                                {testResult.error && <p>Error: {testResult.error}</p>}
                            </div>
                        )}
                    </div>

                    <div className="test-container">
                        <h2>Expected Behavior</h2>
                        <ul>
                            <li><strong>Nodes Only:</strong> Should fit to node boundaries only (edge labels may be clipped)</li>
                            <li><strong>Include Labels:</strong> Should include edge labels in bounds calculation</li>
                        </ul>
                        <p>The "Include Labels" option should provide better visibility for edge labels.</p>
                        <p>Check the console for detailed logging of the bounds calculation process.</p>
                    </div>
                </div>
            );
        }

        function AppWrapper() {
            return (
                <ReactFlowProvider>
                    <TestApp />
                </ReactFlowProvider>
            );
        }

        ReactDOM.render(<AppWrapper />, document.getElementById('root'));
    </script>
</body>
</html>
