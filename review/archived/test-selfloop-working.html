<!DOCTYPE html>
<html>
<head>
    <title>Self-Loop Working Example</title>
    <style>
        body { margin: 0; font-family: sans-serif; }
        #root { width: 100vw; height: 100vh; }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@xyflow/react@12.10.0/dist/umd/index.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;
        const { 
            ReactFlow, 
            addEdge, 
            Background, 
            Controls, 
            useNodesState, 
            useEdgesState,
            useStore,
            getBezierPath,
            Position,
            MarkerType
        } = ReactFlow;

        // Helper function to get actual handle positions
        function getNodeIntersection(intersectionNode, targetNode) {
            const { internals: intersectionInternals } = intersectionNode;
            const { width: intersectionNodeWidth, height: intersectionNodeHeight } = intersectionNode.measured || {
                width: 0,
                height: 0,
            };
            const targetPosition = targetNode.internals.positionAbsolute;

            const w = (intersectionNodeWidth || 0) / 2;
            const h = (intersectionNodeHeight || 0) / 2;

            const x2 = intersectionInternals.positionAbsolute.x + w;
            const y2 = intersectionInternals.positionAbsolute.y + h;
            const x1 = targetPosition.x + w;
            const y1 = targetPosition.y + h;

            const xx1 = (x1 - x2) / (2 * w) - (y1 - y2) / (2 * h);
            const yy1 = (x1 - x2) / (2 * w) + (y1 - y2) / (2 * h);
            const a = 1 / (Math.abs(xx1) + Math.abs(yy1));
            const xx3 = a * xx1;
            const yy3 = a * yy1;
            const x = w * (xx3 + yy3) + x2;
            const y = h * (-xx3 + yy3) + y2;

            return { x, y };
        }

        function getEdgePosition(node, intersectionPoint) {
            const n = { ...node.position, ...node };
            const nx = Math.round(n.x);
            const ny = Math.round(n.y);
            const px = Math.round(intersectionPoint.x);
            const py = Math.round(intersectionPoint.y);

            if (px <= nx + 1) {
                return Position.Left;
            }
            if (px >= nx + (node.measured?.width || 0) - 1) {
                return Position.Right;
            }
            if (py <= ny + 1) {
                return Position.Top;
            }
            if (py >= n.y + (node.measured?.height || 0) - 1) {
                return Position.Bottom;
            }

            return Position.Top;
        }

        function getEdgeParams(source, target) {
            const sourceIntersectionPoint = getNodeIntersection(source, target);
            const targetIntersectionPoint = getNodeIntersection(target, source);

            const sourcePos = getEdgePosition(source, sourceIntersectionPoint);
            const targetPos = getEdgePosition(target, targetIntersectionPoint);

            return {
                sx: sourceIntersectionPoint.x,
                sy: sourceIntersectionPoint.y,
                tx: targetIntersectionPoint.x,
                ty: targetIntersectionPoint.y,
                sourcePos,
                targetPos,
            };
        }

        // Self-connecting edge component using actual handle positions
        function SelfConnectingEdge({ id, source, target, markerEnd }) {
            const { sourceNode, targetNode } = useStore((s) => {
                const sourceNode = s.nodeLookup.get(source);
                const targetNode = s.nodeLookup.get(target);

                return { sourceNode, targetNode };
            });

            if (!sourceNode || !targetNode) {
                return null;
            }

            const { sx, sy, tx, ty, sourcePos, targetPos } = getEdgeParams(sourceNode, targetNode);

            // For self-loops, create a proper arc
            const radiusX = Math.abs(tx - sx) * 0.6;
            const radiusY = 50;
            const edgePath = `M ${sx} ${sy} A ${radiusX} ${radiusY} 0 1 0 ${tx} ${ty}`;

            console.log('SelfConnectingEdge working:', {
                source,
                target,
                sourcePos,
                targetPos,
                sx, sy, tx, ty,
                edgePath
            });

            return (
                <>
                    <path
                        id={id}
                        style={{ stroke: 'black', strokeWidth: 2 }}
                        d={edgePath}
                        markerEnd={markerEnd}
                    />
                </>
            );
        }

        // Edge types
        const edgeTypes = {
            selfconnecting: SelfConnectingEdge,
        };

        // Initial nodes and edges
        const initialNodes = [
            { 
                id: '1', 
                type: 'default', 
                data: { label: 'Node 1' }, 
                position: { x: 100, y: 100 },
                sourcePosition: Position.Right,
                targetPosition: Position.Left,
            },
        ];

        const initialEdges = [
            { 
                id: 'e1', 
                source: '1', 
                target: '1', 
                type: 'selfconnecting',
                markerEnd: { type: MarkerType.Arrow },
            },
        ];

        function App() {
            const [nodes, setNodes, onNodesChange] = useNodesState(initialNodes);
            const [edges, setEdges, onEdgesChange] = useEdgesState(initialEdges);

            const onConnect = useCallback((params) => setEdges((eds) => addEdge(params, eds)), [setEdges]);

            return (
                <div style={{ width: '100vw', height: '100vh' }}>
                    <ReactFlow
                        nodes={nodes}
                        edges={edges}
                        onNodesChange={onNodesChange}
                        onEdgesChange={onEdgesChange}
                        onConnect={onConnect}
                        edgeTypes={edgeTypes}
                        fitView
                    >
                        <Controls />
                        <Background />
                    </ReactFlow>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
